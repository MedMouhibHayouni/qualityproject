<aside [class.w-64]="!collapsed" [class.w-20]="collapsed" class="bg-darkBg text-white h-screen transition-all duration-300 flex flex-col shadow-2xl z-20 relative">
  <!-- Logo Area -->
  <div class="h-16 flex items-center justify-center border-b border-gray-800 bg-black/20">
    <div *ngIf="!collapsed" class="flex items-center space-x-2 px-4 w-full">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center">
        <span class="material-icons text-white text-sm">verified</span>
      </div>
      <span class="text-lg font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-gray-100 to-gray-400">QUALITÉ</span>
    </div>
    <div *ngIf="collapsed" class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center tooltip-trigger">
      <span class="material-icons text-white text-sm">verified</span>
    </div>
  </div>

  <!-- Menu items -->
  <nav class="flex-1 overflow-y-auto py-6 flex flex-col gap-2 px-3">
    <ng-container *ngFor="let item of menuItems">
      <a [routerLink]="item.route" routerLinkActive="bg-white/10 text-primary border-l-4 border-primary" 
         class="flex items-center px-3 py-3 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition-all duration-200 group relative border-l-4 border-transparent">
        
        <span class="material-icons transition-colors duration-200 group-hover:text-primary" [class.text-primary]="router.isActive(item.route, true)">{{ item.icon }}</span>
        
        <span *ngIf="!collapsed" class="ml-4 text-sm font-medium whitespace-nowrap fade-in">{{ item.label }}</span>
        
        <!-- Tooltip for collapsed state -->
        <span *ngIf="collapsed" class="absolute left-14 bg-gray-900 text-xs px-2 py-1 rounded opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50">
          {{ item.label }}
        </span>
      </a>
    </ng-container>
  </nav>

  <!-- Collapse Toggle -->
  <div class="border-t border-gray-800 p-4">
    <button (click)="toggleCollapse()" class="w-full flex items-center justify-center p-2 rounded-lg text-gray-500 hover:bg-white/5 hover:text-white transition-colors">
      <span class="material-icons" *ngIf="!collapsed">chevron_left</span>
      <span class="material-icons" *ngIf="collapsed">chevron_right</span>
      <span *ngIf="!collapsed" class="ml-2 text-sm">Réduire</span>
    </button>
  </div>
</aside>
